apiVersion: v1
kind: ConfigMap
metadata:
  name: environment-settings
data:
  event-bus-user-name: rabbitmquser
  event-bus-host: event-bus
  seed-initial-regular-user: "True" ## From Common.env
  notifications-allowed-origins: http://localhost:5001
  notifications-carts-endpoint: http://carts-service:5007
  identity-gateway-identity-endpoint: http://identity-service:5003
  identity-gateway-products-endpoint: http://products-service:5005
  identity-gateway-orders-endpoint: http://orders-service:5013
  carts-gateway-identity-endpoint: http://identity-service:5003
  carts-gateway-carts-endpoint: http://carts-service:5007
  watchdog-identity-health: http://identity-service:5003/health
  watchdog-products-health: http://products-service:5005/health
  watchdog-carts-health: http://carts-service:5007/health
  watchdog-identity-gateway-health: http://identity-gateway-service:5009/health
  watchdog-notifications-health: http://notifications-service:5011/health
  watchdog-orders-health: http://orders-service:5013/health
  watchdog-carts-gateway-health: http://carts-gateway-service:5015/health
  watchdog-administration-health: http://administration-service:5017/health
  webclient-identity-endpoint: http://identity-service:5003
  webclient-products-endpoint: http://products-service:5005
  webclient-carts-endpoint: http://carts-service:5007
  webclient-identity-gateway-endpoint: http://identity-gateway-service:5009
  webclient-notifications-endpoint: http://notifications-service:5011
  webclient-notifications-for-signalr-endpoint: http://localhost:5011
  webclient-orders-endpoint: http://orders-service:5013
  webclient-carts-gateway-endpoint: http://carts-gateway-service:5015
  webclient-administration-endpoint: http://administration-service:5017
###---
## Here should be the 'Secret' Kubernetes object that contains all the secrets for the environment, such as database passwords, connection strings, API keys, etc. The secrets should be stored in base64 encoded format and should be referenced in the Deployment YAML files for the respective services to inject them as environment variables into the containers. This allows us to keep sensitive information secure and separate from the application code and configuration files.
